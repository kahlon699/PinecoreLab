name: Backend - .NET 8 Linux App Service CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Cache NuGet packages
      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/PinecoreLabApi.csproj') }}
          restore-keys: nuget-

      # 4️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore ./PinecoreLabApi/PinecoreLabApi.csproj

      # 5️⃣ Build project
      - name: Build project
        run: dotnet build ./PinecoreLabApi/PinecoreLabApi.csproj --configuration Release --no-restore

      # 6️⃣ Publish project (OPTIMIZED FOR AZURE LINUX)
      - name: Publish project
        run: |
          dotnet publish ./PinecoreLabApi/PinecoreLabApi.csproj \
            -c Release \
            -o ./publish \
            --no-build \
            --self-contained false \
            /p:UseAppHost=false

      # 7️⃣ Create deployment package (clean structure)
      - name: Prepare deployment package
        run: |
          cd publish
          zip -r ../backend.zip .

      # 8️⃣ Deploy to Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: PinecoreLabApi
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend.zip