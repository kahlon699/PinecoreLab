name: Backend - .NET 8 Linux App Service CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore ./PinecoreLabApi/PinecoreLabApi.csproj

      # 4️⃣ Build project
      - name: Build project
        run: dotnet build ./PinecoreLabApi/PinecoreLabApi.csproj --configuration Release --no-restore

      # 5️⃣ Publish project
      - name: Publish project
        run: dotnet publish ./PinecoreLabApi/PinecoreLabApi.csproj -c Release -o ./publish

      # 6️⃣ Verify files (important debug)
      - name: List publish files
        run: ls -R ./publish

      # 7️⃣ Deploy
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: PinecoreLabApi
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish